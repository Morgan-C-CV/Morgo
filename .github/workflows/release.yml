name: Release Morgo

on:
  push:
    tags:
      - "morgo-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --bin morgo --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/morgo" dist/morgo
          chmod +x dist/morgo
          tar -C dist -czf "morgo-${{ matrix.target }}.tar.gz" morgo
          shasum -a 256 "morgo-${{ matrix.target }}.tar.gz" > "morgo-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            morgo-${{ matrix.target }}.tar.gz
            morgo-${{ matrix.target }}.tar.gz.sha256
          generate_release_notes: true
